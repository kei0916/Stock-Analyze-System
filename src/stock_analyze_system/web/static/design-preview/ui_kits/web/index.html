<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<title>Stock Analyzer · Web UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css"/>
<style>
  :root {
    --sidebar-w: 220px;
    --topbar-h: 56px;
    --content-max: 1280px;
  }
  body { margin: 0; background: var(--bg); color: var(--fg-1); font-family: var(--font-sans); }
  * { box-sizing: border-box; }
  ::selection { background: var(--accent-soft); color: var(--accent); }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  button:focus-visible, input:focus-visible, a:focus-visible {
    outline: 2px solid var(--accent); outline-offset: 1px;
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="Components.jsx"></script>
<script type="text/babel" src="Layout.jsx"></script>
<script type="text/babel" src="Dashboard.jsx"></script>
<script type="text/babel" src="StockDetail.jsx"></script>
<script type="text/babel" src="MoreScreens.jsx"></script>
<script type="text/babel" src="App.jsx"></script>
</body>
</html>
