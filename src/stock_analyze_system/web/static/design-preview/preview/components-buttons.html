<!doctype html>
<html lang="ja" data-theme="dark">
<head>
<meta charset="utf-8"/>
<title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:24px; width:700px; box-sizing:border-box; background:var(--bg); display:flex; flex-direction:column; gap:14px; }
  .row { display:flex; gap:10px; align-items:center; }
  .label { font-size:11px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--fg-3); width:90px; flex-shrink:0; }
  .btn {
    font-family: var(--font-sans); font-size: 13px; font-weight: 500;
    padding: 8px 14px; border-radius: 6px; border: 1px solid transparent;
    cursor: pointer; display:inline-flex; align-items:center; gap:6px;
    transition: background 120ms var(--ease-snap), border-color 120ms var(--ease-snap);
  }
  .btn-primary { background: var(--accent); color: var(--accent-fg); }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-secondary { background: var(--surface-2); color: var(--fg-1); border-color: var(--border-strong); }
  .btn-secondary:hover { background: var(--surface-3); }
  .btn-ghost { background: transparent; color: var(--fg-1); border-color: transparent; }
  .btn-ghost:hover { background: var(--surface-2); }
  .btn-danger { background: transparent; color: var(--down); border-color: var(--border-strong); }
  .btn-danger:hover { background: var(--down-soft); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  svg { width: 14px; height: 14px; stroke-width: 1.6; stroke: currentColor; fill: none; stroke-linecap: round; stroke-linejoin: round; }
</style>
</head>
<body>
  <div class="row">
    <span class="label">Default</span>
    <button class="btn btn-primary"><svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-3.8-7.3M21 5v5h-5"/></svg>同期</button>
    <button class="btn btn-secondary">キャンセル</button>
    <button class="btn btn-ghost">詳細</button>
    <button class="btn btn-danger">削除</button>
  </div>
  <div class="row">
    <span class="label">Hover</span>
    <button class="btn btn-primary" style="background:var(--accent-hover)">同期</button>
    <button class="btn btn-secondary" style="background:var(--surface-3)">キャンセル</button>
    <button class="btn btn-ghost" style="background:var(--surface-2)">詳細</button>
    <button class="btn btn-danger" style="background:var(--down-soft)">削除</button>
  </div>
  <div class="row">
    <span class="label">Disabled</span>
    <button class="btn btn-primary" disabled>同期</button>
    <button class="btn btn-secondary" disabled>キャンセル</button>
    <button class="btn btn-ghost" disabled>詳細</button>
  </div>
  <div class="row">
    <span class="label">Compact</span>
    <button class="btn btn-primary btn-sm">追加</button>
    <button class="btn btn-secondary btn-sm">エクスポート</button>
    <button class="btn btn-ghost btn-sm">…</button>
  </div>
</body>
</html>
