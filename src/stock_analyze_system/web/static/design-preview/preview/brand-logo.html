<!doctype html>
<html lang="ja" data-theme="dark">
<head>
<meta charset="utf-8"/>
<title>Logo</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:24px; width:700px; box-sizing:border-box; background:var(--bg); display:flex; flex-direction:column; gap:14px; }
  .panel { padding: 24px; border:1px solid var(--border); border-radius:8px; display:flex; align-items:center; justify-content:center; min-height:80px; }
  .lab { font-size:11px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--fg-3); margin-bottom:6px; }
  .row { display:grid; grid-template-columns: 1fr 1fr; gap:14px; }
  img { display:block; }
</style>
</head>
<body>
  <div>
    <div class="lab">Wordmark on canvas</div>
    <div class="panel" style="background:var(--bg)">
      <img src="../assets/logo.svg" alt="Stock Analyzer" height="32" style="color:#F2F4F7"/>
    </div>
  </div>
  <div class="row">
    <div>
      <div class="lab">Mark</div>
      <div class="panel" style="background:var(--bg)">
        <img src="../assets/mark.svg" alt="" width="48" height="48"/>
      </div>
    </div>
    <div>
      <div class="lab">Mark · inverse</div>
      <div class="panel" style="background:#F2F4F7">
        <img src="../assets/mark-inverse.svg" alt="" width="48" height="48"/>
      </div>
    </div>
  </div>
</body>
</html>
