<!doctype html>
<html lang="ja" data-theme="dark">
<head>
<meta charset="utf-8"/>
<title>Empty + Toast</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:20px; width:700px; box-sizing:border-box; background:var(--bg); display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .lab { font-size:11px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--fg-3); margin-bottom:8px; }
  .empty { border:1px dashed var(--border-strong); border-radius:8px; padding:32px 20px; text-align:center; color:var(--fg-2); display:flex; flex-direction:column; align-items:center; gap:8px; min-height:140px; justify-content:center; }
  .empty svg { width:24px; height:24px; stroke:var(--fg-3); stroke-width:1.5; fill:none; stroke-linecap:round; stroke-linejoin:round; }
  .empty .h { font-size:13px; font-weight:600; color:var(--fg-1); }
  .empty .b { font-size:12px; color:var(--fg-2); }
  .toasts { display:flex; flex-direction:column; gap:8px; }
  .toast { padding:10px 12px; border-radius:6px; border:1px solid var(--border); background:var(--surface); font-size:12px; color:var(--fg-1); display:flex; gap:8px; align-items:flex-start; }
  .toast.ok    { border-left:3px solid var(--up); }
  .toast.err   { border-left:3px solid var(--down); }
  .toast.info  { border-left:3px solid var(--accent); }
  .toast .t { font-weight:600; font-size:12px; }
  .toast .d { color:var(--fg-2); font-size:11px; margin-top:2px; }
</style>
</head>
<body>
  <div>
    <div class="lab">Empty state</div>
    <div class="empty">
      <svg viewBox="0 0 24 24"><path d="M3 12h4l3-9 4 18 3-9h4"/></svg>
      <div class="h">データがありません</div>
      <div class="b">同期を実行して財務データを取得してください。</div>
    </div>
  </div>
  <div>
    <div class="lab">Toasts</div>
    <div class="toasts">
      <div class="toast ok"><div><div class="t">同期が完了しました</div><div class="d">358件のレコードを更新</div></div></div>
      <div class="toast err"><div><div class="t">同期に失敗しました</div><div class="d">SEC EDGAR レートリミット超過</div></div></div>
      <div class="toast info"><div><div class="t">分析中</div><div class="d">10-K (FY2024) をインデックス化しています</div></div></div>
    </div>
  </div>
</body>
</html>
