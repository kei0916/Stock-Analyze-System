<!doctype html>
<html lang="ja" data-theme="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=700"/>
  <title>Card</title>
  <link rel="stylesheet" href="../colors_and_type.css"/>
  <style>
    html, body { margin: 0; padding: 0; background: var(--bg); }
    body { padding: 20px; box-sizing: border-box; width: 700px; }
    .row { display: flex; gap: 12px; align-items: stretch; }
    .col { display: flex; flex-direction: column; gap: 8px; }
    .swatch { display: flex; flex-direction: column; gap: 6px; }
    .chip { width: 100%; height: 56px; border-radius: var(--radius-md); border: 1px solid var(--border); }
    .meta { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
    .meta .name { font-size: 12px; font-weight: 600; color: var(--fg-1); }
    .meta .val { font-family: var(--font-mono); font-size: 11px; color: var(--fg-2); font-variant-numeric: tabular-nums; }
    .group-label {
      font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--fg-3); margin-bottom: 12px;
    }
  </style>
</head>
<body>
</body>
</html>
