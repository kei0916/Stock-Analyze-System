<!doctype html>
<html lang="ja" data-theme="dark">
<head>
<meta charset="utf-8"/>
<title>Radius + Shadow</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:24px; width:700px; box-sizing:border-box; background:var(--bg); }
  .section { margin-bottom:18px; }
  .label { font-size:11px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--fg-3); margin-bottom:10px; }
  .row { display:flex; gap:12px; }
  .tile { flex:1; background:var(--surface-2); border:1px solid var(--border); padding:12px; display:flex; flex-direction:column; align-items:center; gap:8px; min-height:64px; }
  .tile .name { font-size:11px; color:var(--fg-2); font-family:var(--font-mono); }
  .shadow-tile { background:var(--surface); padding:18px; border-radius:8px; border:1px solid var(--border); flex:1; text-align:center; font-size:11px; color:var(--fg-2); font-family:var(--font-mono); }
</style>
</head>
<body>
  <div class="section">
    <div class="label">Radius</div>
    <div class="row">
      <div class="tile" style="border-radius:4px"><span class="name">sm · 4</span></div>
      <div class="tile" style="border-radius:6px"><span class="name">md · 6</span></div>
      <div class="tile" style="border-radius:8px"><span class="name">lg · 8</span></div>
      <div class="tile" style="border-radius:12px"><span class="name">xl · 12</span></div>
      <div class="tile" style="border-radius:999px; padding:8px 16px; min-height:0"><span class="name">pill</span></div>
    </div>
  </div>
  <div class="section">
    <div class="label">Elevation</div>
    <div class="row">
      <div class="shadow-tile">surface · flat</div>
      <div class="shadow-tile" style="box-shadow: 0 1px 2px rgba(0,0,0,.4), 0 4px 12px rgba(0,0,0,.32)">shadow-1 · popover</div>
      <div class="shadow-tile" style="box-shadow: 0 8px 32px rgba(0,0,0,.5)">shadow-2 · modal</div>
    </div>
  </div>
</body>
</html>
