<!doctype html>
<html lang="ja" data-theme="dark">
<head>
<meta charset="utf-8"/>
<title>Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:20px; width:700px; box-sizing:border-box; background:var(--bg); }
  .grid { display:grid; grid-template-columns: repeat(8, 1fr); gap:8px; }
  .ic { display:flex; flex-direction:column; align-items:center; gap:6px; padding:12px 6px; border:1px solid var(--border); border-radius:6px; background:var(--surface); }
  .ic svg { width:18px; height:18px; stroke: var(--fg-1); fill: none; stroke-width:1.6; stroke-linecap:round; stroke-linejoin:round; }
  .ic span { font: 500 10px var(--font-mono); color:var(--fg-3); }
</style>
</head>
<body>
  <div class="grid">
    <div class="ic"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg><span>search</span></div>
    <div class="ic"><svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-3.8-7.3M21 5v5h-5"/></svg><span>refresh</span></div>
    <div class="ic"><svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg><span>bookmark</span></div>
    <div class="ic"><svg viewBox="0 0 24 24"><path d="M3 6h18M7 12h10M11 18h2"/></svg><span>filter</span></div>
    <div class="ic"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.5"/></svg><span>target</span></div>
    <div class="ic"><svg viewBox="0 0 24 24"><path d="M13 2L4 14h7l-1 8 9-12h-7l1-8z"/></svg><span>zap</span></div>
    <div class="ic"><svg viewBox="0 0 24 24"><path d="M3 12h4l3-9 4 18 3-9h4"/></svg><span>line-chart</span></div>
    <div class="ic"><svg viewBox="0 0 24 24"><path d="M12 3l1.6 5h5.4l-4.4 3.2 1.7 5.3L12 13.6 7.7 16.5l1.7-5.3L5 8h5.4z"/></svg><span>sparkles</span></div>
    <div class="ic"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg><span>file</span></div>
    <div class="ic"><svg viewBox="0 0 24 24"><path d="M7 17l10-10M9 7h8v8"/></svg><span>up-right</span></div>
    <div class="ic"><svg viewBox="0 0 24 24"><path d="M7 7l10 10M9 17h8V9"/></svg><span>down-right</span></div>
    <div class="ic"><svg viewBox="0 0 24 24"><path d="M14 4h6v6M10 14L20 4M14 12v6H4V8h6"/></svg><span>external</span></div>
    <div class="ic"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="10" r="3"/><path d="M6.5 19a6 6 0 0 1 11 0"/></svg><span>user</span></div>
    <div class="ic"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg><span>logout</span></div>
    <div class="ic"><svg viewBox="0 0 24 24"><path d="M6 15l6-6 6 6"/></svg><span>chev-up</span></div>
    <div class="ic"><svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg><span>chev-dn</span></div>
  </div>
</body>
</html>
