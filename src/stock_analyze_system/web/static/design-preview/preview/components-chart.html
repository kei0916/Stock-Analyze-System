<!doctype html>
<html lang="ja" data-theme="dark">
<head>
<meta charset="utf-8"/>
<title>Chart preview</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:20px; width:700px; box-sizing:border-box; background:var(--bg); }
  .panel { border:1px solid var(--border); border-radius:8px; padding:16px; background:var(--surface); }
  .head { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px; }
  .title { font-size:13px; font-weight:600; color:var(--fg-1); }
  .sub { font-size:11px; color:var(--fg-3); font-family:var(--font-mono); }
</style>
</head>
<body>
  <div class="panel">
    <div class="head"><span class="title">PER 推移 · 10年</span><span class="sub">monthly · US_AAPL</span></div>
    <svg viewBox="0 0 660 200" width="100%" height="200" style="display:block">
      <defs>
        <linearGradient id="fade" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.25"/>
          <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <!-- gridlines -->
      <g stroke="#22272F" stroke-width="1">
        <line x1="0" y1="40" x2="660" y2="40"/>
        <line x1="0" y1="80" x2="660" y2="80"/>
        <line x1="0" y1="120" x2="660" y2="120"/>
        <line x1="0" y1="160" x2="660" y2="160"/>
      </g>
      <!-- y axis labels -->
      <g fill="#5C636E" font-family="JetBrains Mono" font-size="10">
        <text x="0" y="36">35</text>
        <text x="0" y="76">28</text>
        <text x="0" y="116">21</text>
        <text x="0" y="156">14</text>
      </g>
      <!-- area + line -->
      <path d="M30,150 L80,140 L130,120 L180,135 L230,90 L280,100 L330,70 L380,55 L430,80 L480,60 L530,40 L580,55 L630,45 L630,180 L30,180 Z" fill="url(#fade)"/>
      <path d="M30,150 L80,140 L130,120 L180,135 L230,90 L280,100 L330,70 L380,55 L430,80 L480,60 L530,40 L580,55 L630,45" stroke="#22D3EE" stroke-width="1.6" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
      <!-- last dot -->
      <circle cx="630" cy="45" r="3" fill="#22D3EE"/>
      <!-- median line -->
      <line x1="0" y1="95" x2="660" y2="95" stroke="#5C636E" stroke-width="1" stroke-dasharray="3 3"/>
      <text x="608" y="92" fill="#5C636E" font-family="JetBrains Mono" font-size="9">median 26.4</text>
    </svg>
  </div>
</body>
</html>
